services:
  - type: web
    name: kanokwere
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kanokwere-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_TIMEOUT_SECONDS
        value: "180"
      - key: OPENAI_MAX_RETRIES
        value: "0"
      - key: GENERATION_ATTEMPTS
        value: "2"
      - key: GENERATION_STALE_MINUTES
        value: "8"
      - key: MAX_CONTEXT_CHARS
        value: "60000"
      - key: ADMIN_KEY
        generateValue: true
      - key: ALLOW_DEMO_QUESTIONS
        value: "false"
      - key: PASS_THRESHOLD
        value: "80"
      - key: QUESTION_TIME_SECONDS
        value: "30"
      - key: MAX_UPLOAD_MB
        value: "15"
      - key: SESSION_TOKEN_TTL_MINUTES
        value: "30"
      - key: MAX_ATTEMPTS_PER_DOCUMENT
        value: "1"
      - key: WEBCAM_REQUIRED
        value: "true"
      - key: WEBCAM_MAX_IMAGE_KB
        value: "700"

databases:
  - name: kanokwere-db
    databaseName: kanokwere
    user: kanokwere
